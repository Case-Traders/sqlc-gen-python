version: '2'
plugins:
- name: py
  wasm:
    url: file://../../../../bin/sqlc-gen-python.wasm
    sha256: "d587b6af0bfe07dbb2c316bffb5f7f5d0073a60788c5d533b84373067c9c1916"
sql:
- schema: schema.sql
  queries: query.sql
  engine: postgresql
  codegen:
  - plugin: py
    out: python
    options:
      package: querytest
      emit_sync_querier: true
      emit_async_querier: true
      inflection_exclude_table_names:
      - my_data
      - exclusions
